name: fibey-coordinator
displayName: "Fibey — Network Operations Coordinator"
description: >
  Long-running coordinator agent for data center network operations.
  Monitors telemetry, investigates anomalies, dispatches contractors,
  and manages incident lifecycle with scale-to-zero and persistent sessions.
metadata:
  tags:
    - Network Operations
    - Long-Running Agent
    - Responses Protocol
    - Activity Protocol
    - Teams
template:
  name: fibey-coordinator
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
    - protocol: activity_protocol
      version: 1.0.0
  environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
resources:
  - kind: model
    id: gpt-5
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME
