# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml

kind: hosted
name: fibey-coordinator
description: |
  Long-running coordinator agent for data center network operations. Monitors telemetry, investigates anomalies, dispatches contractors, and manages incident lifecycle with scale-to-zero and persistent sessions.
metadata:
  tags:
    - Network Operations
    - Long-Running Agent
    - Responses Protocol
    - Activity Protocol
    - Teams
protocols:
  - protocol: responses
    version: 1.0.0
  # Activity protocol enables Teams: the platform passes the raw Bot Framework
  # Activity through to the container's POST /api/messages (no responses<->activity
  # mapper). The agent's Entra Agent ID is the bot identity; the platform provisions
  # the bot whose messaging endpoint is .../endpoint/protocols/activityProtocol.
  - protocol: activity_protocol
    version: 1.0.0
resources:
  cpu: "1"
  memory: 2Gi
environment_variables:
  - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
    value: gpt-5
  - name: APPROVAL_SERVER_PORT
    value: "8090"
  - name: ENABLE_INSTRUMENTATION
    value: "true"
  - name: ENABLE_SENSITIVE_DATA
    value: "true"

  # ── Connected agent: delegate technician questions to the field-ops-agent ──
  # Base URL of the deployed field-ops-agent (its Responses protocol root). The
  # coordinator's ask_field_ops tool POSTs to `${FIELD_OPS_AGENT_ENDPOINT}/responses`.
  # Resolved from your azd env at deploy time (`azd env set FIELD_OPS_AGENT_ENDPOINT "<url>"`),
  # so the real URL stays in the gitignored .env. If empty, ask_field_ops returns a
  # graceful "not configured" message instead of failing.
  # Grant this coordinator's managed identity access to invoke the field-ops agent.
  - name: FIELD_OPS_AGENT_ENDPOINT
    value: ${FIELD_OPS_AGENT_ENDPOINT}
  # Optional: model name sent in the Responses request body (the hosted field-ops
  # agent uses its own worker model regardless). Defaults to the coordinator model.
  # - name: FIELD_OPS_AGENT_MODEL
  #   value: gpt-5

  # ── Optional: Durable Task Scheduler (human-in-the-loop approval workflow) ──
  # When set, approval-gated work orders run through a durable orchestration so
  # they survive scale-to-zero. If unset, the agent uses an in-process fallback.
  # - name: DURABLE_TASK_ENDPOINT
  #   value: https://<your-dts-resource>.<region>.durabletask.io
  # - name: DURABLE_TASK_TASKHUB
  #   value: <your-taskhub-name>

  # ── Optional: Teams (Activity Protocol) proactive messaging ──
  # APPROVER_UPN is the operator who receives proactive approval cards.
  # TEAMS_STATE_BLOB_URL is a shared Azure Blob container that stores the Teams
  # conversation mapping so the heartbeat (a different session) can DM the operator.
  # If unset, a session-local file fallback is used (single-session only).
  # - name: APPROVER_UPN
  #   value: <operator-upn@your-tenant>
  # - name: TEAMS_STATE_BLOB_URL
  #   value: https://<account>.blob.core.windows.net/teams-state
